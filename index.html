<!DOCTYPE html>
<html>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="css/style.css"/>
        
    <head>
        <title>Mon portail cartographique</title>
    </head>
    <body>
        <h1>Bienvenue sur mon portail cartographique</h1>
        <div id="map"></div>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script>
            //Initialisation de la carte Leaflet
            const map = L.map('map').setView([47.791528,0.412223], 12);
            
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
            }).addTo(map);
            
            //Ajout de la couche randonnees.geojson
            fetch('couches/randonnees.geojson')
                .then(response => response.json())
                .then(data => {
        		//Personnalisation de la couche randonnees.geojson
				const randonnees = L.geoJSON(data, {
					style: {
						color: "#008000",
						weight: 3
					},
					onEachFeature: function(feature, layer) {
						layer.bindPopup(
							`<b>${feature.properties.id}</b><br>
							 Distance : ${feature.properties.distance} km<br>
							 Durée : ${feature.properties.dureeEstim} h`
						);
					}
				});
				randonnees.addTo(map);
			});
        </script>
    </body>
</html>
